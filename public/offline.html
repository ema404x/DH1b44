<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — DH1 ERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #0f1e34;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(239,68,68,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #f1f5f9; }
    p  { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 28px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(29,107,243,0.15);
      border: 1px solid rgba(29,107,243,0.3);
      color: #60a5fa;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 99px;
      margin-bottom: 24px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    button {
      background: #1d6bf3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }
    button:hover { background: #1558d0; }
    .note { font-size: 12px; color: #475569; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <div class="badge"><div class="dot"></div> Modo sin conexión</div>
    <h1>Sin conexión a internet</h1>
    <p>No hay conexión disponible. Las órdenes de trabajo que crees se guardarán localmente y se sincronizarán automáticamente cuando recuperes la conexión.</p>
    <button onclick="window.location.reload()">Reintentar conexión</button>
    <p class="note">DH1 ERP — Los datos offline se sincronizan automáticamente</p>
  </div>
  <script>
    window.addEventListener('online', () => window.location.replace('/'));
  </script>
</body>
</html>
